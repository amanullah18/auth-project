version: '3.7'

services:
  mysql-db:  # ✅ match this with DB_HOST below
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: task1
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  nest-app:
    build: .
    container_name: nest-app
    ports:
      - "3000:3000"
    depends_on:
      - mysql-db
      - minio
    environment:
      DB_HOST: mysql-db        # ✅ use the correct service name here
      DB_PORT: 3306            # ✅ use container's internal port
      DB_USERNAME: root
      DB_PASSWORD: ""
      DB_NAME: task1
    volumes:
      - .:/app
    working_dir: /app
    command: npm run start:dev

volumes:
  mysql_data:
  minio_data:
